<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Courses — EduCenter</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">EC</div>
      <div><div class="sidebar-brand-name">EduCenter</div><div class="sidebar-brand-sub">Teacher Portal</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav" aria-label="Teacher navigation"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-user-name">Loading…</div>
          <div class="sidebar-user-role" id="sidebar-user-role"></div>
        </div>
        <button class="btn-logout" id="btn-logout" title="Sign out" aria-label="Sign out">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
      </button>
      <span class="topbar-title">My Courses</span>
      <div class="topbar-actions"></div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h1>My Courses</h1>
          <p>Courses you are currently assigned to teach.</p>
        </div>
      </div>

      <div id="courses-container">
        <div class="loading"><div class="spinner"></div><span>Loading your courses…</span></div>
      </div>
    </main>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/ui.js"></script>
<script>
const currentUser = auth.requireAuth('teacher');
if (currentUser) {
  renderNav('courses');
  loadCourses();
}

async function loadCourses() {
  const el = document.getElementById('courses-container');
  setContent(el, loadingHTML());
  try {
    const res  = await api.get('/teachers/me/courses');
    const list = Array.isArray(res) ? res : (res.data || []);
    renderCourses(list);
  } catch (err) {
    setContent(el, emptyHTML('Couldn\'t load courses', err.message));
  }
}

function renderCourses(list) {
  const el = document.getElementById('courses-container');
  if (!list.length) {
    setContent(el, emptyHTML('No courses assigned', 'You haven\'t been assigned to teach any courses yet. Contact your administrator.'));
    return;
  }

  setContent(el, `<div class="courses-grid">${list.map(courseCard).join('')}</div>`);
}

function courseCard(c) {
  const id       = c._id || c.id;
  const title    = c.title || 'Untitled';
  const catName  = c.category_id?.name || 'General';
  const schedule = c.schedule || '';
  const enrolled = c.enrolled_count ?? 0;
  const status   = (c.status || 'available').toUpperCase();

  return `
    <div class="course-card">
      <div class="course-card-header">
        <div class="course-card-cat">${catName}</div>
        <div class="course-card-title">${title}</div>
      </div>
      <div class="course-card-body">
        <div class="course-meta">
          ${schedule ? `<div class="course-meta-item">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5"/></svg>
            ${schedule}
          </div>` : ''}
          <div class="course-meta-item">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z"/></svg>
            ${enrolled} enrolled student${enrolled !== 1 ? 's' : ''}
          </div>
        </div>
        ${statusBadge(status)}
      </div>
      <div class="course-card-footer">
        <a href="course-detail.html?courseId=${id}" class="btn btn-primary btn-sm">
          View roster &amp; grades
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg>
        </a>
        <a href="grades.html?courseId=${id}" class="btn btn-secondary btn-sm">All grades</a>
      </div>
    </div>`;
}
</script>
</body>
</html>
