<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Courses — EduCenter</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">EC</div>
      <div><div class="sidebar-brand-name">EduCenter</div><div class="sidebar-brand-sub">Student Portal</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav" aria-label="Student navigation"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-user-name">Loading…</div>
          <div class="sidebar-user-role" id="sidebar-user-role"></div>
        </div>
        <button class="btn-logout" id="btn-logout" title="Sign out" aria-label="Sign out">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
      </button>
      <span class="topbar-title">Browse Courses</span>
      <div class="topbar-actions"></div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h1>Course Catalogue</h1>
          <p>Find a course and request enrollment to get started.</p>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters-bar">
        <input class="form-input" type="search" id="search-input" placeholder="Search courses…" style="max-width:260px;">
        <select class="form-select" id="cat-filter" style="max-width:200px;">
          <option value="">All categories</option>
        </select>
        <select class="form-select" id="sort-filter" style="max-width:180px;">
          <option value="">Default sort</option>
          <option value="price_asc">Price: low → high</option>
          <option value="price_desc">Price: high → low</option>
        </select>
      </div>

      <div id="courses-container">
        <div class="loading"><div class="spinner"></div><span>Loading courses…</span></div>
      </div>
    </main>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/ui.js"></script>
<script>
const currentUser = auth.requireAuth('STUDENT'); // Redirects to login if not authenticated or wrong role
if (currentUser) {
  renderNav('browse');
  init();
}

let allCourses = [];

async function init() {
  await loadCategories();
  await loadCourses();

  document.getElementById('search-input').addEventListener('input', renderFiltered);
  document.getElementById('cat-filter').addEventListener('change', renderFiltered);
  document.getElementById('sort-filter').addEventListener('change', renderFiltered);
}

async function loadCategories() {
  try {
    const cats = await api.get('/categories');
    const sel = document.getElementById('cat-filter');
    (Array.isArray(cats) ? cats : cats.data || []).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c._id || c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch { /* silently ignore — categories are optional filter */ }
}

async function loadCourses() {
  const container = document.getElementById('courses-container');
  setContent(container, loadingHTML());
  try {
    const res = await api.get('/courses');
    allCourses = Array.isArray(res) ? res : (res.data || res.courses || []);
    renderFiltered();
  } catch (err) {
    setContent(container, emptyHTML('Couldn\'t load courses', err.message || 'Please try again later.'));
  }
}

function renderFiltered() {
  const query  = document.getElementById('search-input').value.toLowerCase();
  const catId  = document.getElementById('cat-filter').value;
  const sort   = document.getElementById('sort-filter').value;

  let list = allCourses.filter(c => {
    const title = (c.title || c.name || '').toLowerCase();
    const matchQ = !query || title.includes(query);
    const catVal = c.category?._id || c.category?.id || c.categoryId || c.category || '';
    const matchC = !catId || catVal === catId;
    return matchQ && matchC;
  });

  if (sort === 'price_asc')  list = [...list].sort((a, b) => (a.price || 0) - (b.price || 0));
  if (sort === 'price_desc') list = [...list].sort((a, b) => (b.price || 0) - (a.price || 0));

  const container = document.getElementById('courses-container');
  if (!list.length) {
    setContent(container, emptyHTML('No courses found', 'Try adjusting your search or category filter.'));
    return;
  }
  setContent(container, `<div class="courses-grid">${list.map(courseCard).join('')}</div>`);

  container.querySelectorAll('.btn-enroll').forEach(btn => {
    btn.addEventListener('click', () => enrollInCourse(btn.dataset.id, btn.dataset.title));
  });
}

function courseCard(c) {
  const id         = c._id || c.id;
  const title      = c.title || c.name || 'Untitled Course';
  const catName    = c.category?.name || c.categoryName || 'General';
  const teacher    = c.teacher?.full_name || c.teacher?.name || c.teacherName || '—';
  const price      = c.price != null ? formatPrice(c.price) : 'Free';
  const seats      = c.seats != null ? c.seats : (c.max_students || c.maxStudents || '—');
  const enrolled   = c.enrolled_count || c.enrolledCount || c.enrollments_count || 0;
  const available  = seats !== '—' ? Math.max(0, seats - enrolled) : '—';
  const schedule   = c.schedule || c.timing || '';
  const status     = (c.status || '').toUpperCase();

  const seatsDisplay = available === '—' ? '' : `${available} seats left`;

  return `
    <div class="course-card" data-id="${id}">
      <div class="course-card-header">
        <div class="course-card-cat">${catName}</div>
        <div class="course-card-title">${title}</div>
      </div>
      <div class="course-card-body">
        <div class="course-meta">
          ${teacher !== '—' ? `<div class="course-meta-item">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
            ${teacher}
          </div>` : ''}
          ${schedule ? `<div class="course-meta-item">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5"/></svg>
            ${schedule}
          </div>` : ''}
          ${seatsDisplay ? `<div class="course-meta-item">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z"/></svg>
            ${seatsDisplay}
          </div>` : ''}
        </div>
        <div class="course-price">${price}</div>
      </div>
      <div class="course-card-footer">
        ${status === 'INACTIVE' ? '<span class="badge badge-muted">Not available</span>' : ''}
        ${status !== 'INACTIVE' ? `<button class="btn btn-primary btn-sm btn-enroll" data-id="${id}" data-title="${title}">Request enrollment</button>` : ''}
        ${statusBadge(status)}
      </div>
    </div>`;
}

async function enrollInCourse(courseId, courseTitle) {
  openModal(
    'Request Enrollment',
    `<p style="color:var(--text-muted);font-size:14px;margin-bottom:12px;">
       You're about to request enrollment in:
     </p>
     <div class="info-box"><strong>${courseTitle}</strong><br>
     Your request will be reviewed by an administrator before being confirmed.</div>`,
    `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary btn-sm" id="modal-confirm-btn">Send request</button>`
  );
  setTimeout(() => {
    document.getElementById('modal-confirm-btn')?.addEventListener('click', async () => {
      const btn = document.getElementById('modal-confirm-btn');
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        await api.post(`/courses/${courseId}/enrollments`);
        closeModal();
        showToast('Enrollment request sent! An admin will review it shortly.', 'success');
      } catch (err) {
        btn.disabled = false; btn.textContent = 'Send request';
        showToast(err.message || 'Request failed — please try again.', 'error');
      }
    });
  }, 50);
}
</script>
</body>
</html>
