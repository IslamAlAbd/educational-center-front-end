<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Courses — EduCenter</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div class="shell">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-logo">EC</div>
          <div>
            <div class="sidebar-brand-name">EduCenter</div>
            <div class="sidebar-brand-sub">Student Portal</div>
          </div>
        </div>
        <nav
          class="sidebar-nav"
          id="sidebar-nav"
          aria-label="Student navigation"
        ></nav>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <div class="sidebar-avatar" id="sidebar-avatar">?</div>
            <div class="sidebar-user-info">
              <div class="sidebar-user-name" id="sidebar-user-name">
                Loading…
              </div>
              <div class="sidebar-user-role" id="sidebar-user-role"></div>
            </div>
            <button
              class="btn-logout"
              id="btn-logout"
              title="Sign out"
              aria-label="Sign out"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                width="16"
                height="16"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"
                />
              </svg>
            </button>
          </div>
        </div>
      </aside>

      <div class="main">
        <header class="topbar">
          <button
            class="menu-toggle"
            id="menu-toggle"
            aria-label="Toggle sidebar"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
              width="20"
              height="20"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
          </button>
          <span class="topbar-title">My Courses</span>
          <div class="topbar-actions">
            <a href="browse.html" class="btn btn-primary btn-sm">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                width="14"
                height="14"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 4.5v15m7.5-7.5h-15"
                />
              </svg>
              Browse courses
            </a>
          </div>
        </header>

        <main class="page-content">
          <div class="page-header">
            <div>
              <h1>My Enrollments</h1>
              <p>Track the status of your course enrollments.</p>
            </div>
          </div>

          <div
            class="filter-chips"
            id="status-chips"
            style="margin-bottom: 20px"
          >
            <button class="chip active" data-status="all">All</button>
            <button class="chip" data-status="PENDING">Pending</button>
            <button class="chip" data-status="ACCEPTED">Accepted</button>
            <button class="chip" data-status="REJECTED">Rejected</button>
            <button class="chip" data-status="CANCELLED">Cancelled</button>
          </div>

          <div id="courses-container">
            <div class="loading">
              <div class="spinner"></div>
              <span>Loading your courses…</span>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/ui.js"></script>
    <script>
      let activeStatus = "all";
      const currentUser = auth.requireAuth("student");
      if (currentUser) {
        renderNav("my-courses");
        init();
      }


      function init() {
        document
          .getElementById("status-chips")
          .addEventListener("click", (e) => {
            const chip = e.target.closest(".chip");
            if (!chip) return;
            document
              .querySelectorAll("#status-chips .chip")
              .forEach((c) => c.classList.remove("active"));
            chip.classList.add("active");
            activeStatus = chip.dataset.status;
            loadCourses();
          });
        loadCourses();
      }

      async function loadCourses() {
        const container = document.getElementById("courses-container");
        setContent(container, loadingHTML());
        try {
          const url =
            activeStatus === "all"
              ? "/students/me/courses?status=all"
              : `/students/me/courses?status=${activeStatus}`;
          const res = await api.get(url);
          const list = Array.isArray(res)
            ? res
            : res.data || res.enrollments || [];
          renderList(list);
        } catch (err) {
          setContent(
            container,
            emptyHTML(
              "Couldn't load courses",
              err.message || "Please try again.",
            ),
          );
        }
      }

      function renderList(list) {
        const container = document.getElementById("courses-container");
        if (!list.length) {
          setContent(
            container,
            emptyHTML(
              "No enrollments yet",
              activeStatus === "all"
                ? "You haven't requested enrollment in any course yet."
                : `No ${activeStatus.toLowerCase()} enrollments found.`,
              `<a href="browse.html" class="btn btn-primary btn-sm" style="margin-top:8px;">Browse courses</a>`,
            ),
          );
          return;
        }

        setContent(
          container,
          `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Course</th>
            <th>Category</th>
            <th>Enrolled on</th>
            <th>Status</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody>
          ${list.map(enrollmentRow).join("")}
        </tbody>
      </table>
    </div>`,
        );
      }

      function enrollmentRow(e) {
        // Enrollment shape: may have .course (object) or .courseId + .courseTitle, etc.
        const course = e.course_id || {};
        const title = course.title || "—";
        const catName = course.category_id?.name || "—";
        const enrolledAt =
          e.created_at || e.createdAt || e.enrolled_at || e.enrolledAt;
        const status = (e.status || "").toUpperCase();
        const rejection = e.rejection_reason || e.rejectionReason || "";

        return `
    <tr>
      <td class="td-name">${title}</td>
      <td class="td-muted">${catName}</td>
      <td class="td-muted">${formatDate(enrolledAt)}</td>
      <td>${statusBadge(status)}</td>
      <td>
        ${
          status === "REJECTED" && rejection
            ? `<span class="rejection-note" style="display:inline-block;padding:4px 10px;font-size:12px;">${rejection}</span>`
            : '<span class="td-muted">—</span>'
        }
      </td>
    </tr>`;
      }
    </script>
  </body>
</html>
