<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — EduCenter Admin</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div class="shell">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-logo">EC</div>
          <div>
            <div class="sidebar-brand-name">EduCenter</div>
            <div class="sidebar-brand-sub">Administration</div>
          </div>
        </div>
        <nav
          class="sidebar-nav"
          id="sidebar-nav"
          aria-label="Admin navigation"
        ></nav>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <div class="sidebar-avatar" id="sidebar-avatar">?</div>
            <div class="sidebar-user-info">
              <div class="sidebar-user-name" id="sidebar-user-name">
                Loading…
              </div>
              <div class="sidebar-user-role" id="sidebar-user-role"></div>
            </div>
            <button
              class="btn-logout"
              id="btn-logout"
              title="Sign out"
              aria-label="Sign out"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                width="16"
                height="16"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"
                />
              </svg>
            </button>
          </div>
        </div>
      </aside>

      <div class="main">
        <header class="topbar">
          <button
            class="menu-toggle"
            id="menu-toggle"
            aria-label="Toggle sidebar"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
              width="20"
              height="20"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
          </button>
          <span class="topbar-title">Dashboard</span>
          <div class="topbar-actions">
            <button class="btn btn-secondary btn-sm" id="refresh-btn">
              Refresh
            </button>
          </div>
        </header>

        <main class="page-content">
          <div class="page-header">
            <div>
              <h1>Overview</h1>
              <p>
                Platform-wide metrics for students, teachers, courses, and
                enrollments.
              </p>
            </div>
          </div>

          <!-- Date range filter — applies to enrollment & course breakdowns only -->
          <div class="card" style="margin-bottom: 20px">
            <div
              class="card-body"
              style="
                padding: 16px 22px;
                display: flex;
                align-items: flex-end;
                gap: 12px;
                flex-wrap: wrap;
              "
            >
              <div class="form-group" style="margin-bottom: 0">
                <label class="form-label" for="from-date">From</label>
                <input class="form-input" type="date" id="from-date" />
              </div>
              <div class="form-group" style="margin-bottom: 0">
                <label class="form-label" for="to-date">To</label>
                <input class="form-input" type="date" id="to-date" />
              </div>
              <button class="btn btn-primary btn-sm" id="apply-range-btn">
                Apply
              </button>
              <button class="btn btn-secondary btn-sm" id="clear-range-btn">
                Clear
              </button>
            </div>
          </div>

          <!-- Summary stat cards -->
          <div id="summary-stats" class="stats-grid">
            <div class="stat-card accent-teal">
              <div class="spinner" style="margin: 8px 0"></div>
            </div>
            <div class="stat-card accent-navy">
              <div class="spinner" style="margin: 8px 0"></div>
            </div>
            <div class="stat-card accent-warning">
              <div class="spinner" style="margin: 8px 0"></div>
            </div>
            <div class="stat-card accent-danger">
              <div class="spinner" style="margin: 8px 0"></div>
            </div>
          </div>

          <!-- Enrollments by status + Courses by status, side by side -->
          <div
            style="
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 16px;
              margin-bottom: 16px;
            "
            id="mid-grid"
          >
            <div class="card">
              <div class="card-header">
                <span class="card-title">Enrollments by Status</span>
              </div>
              <div class="card-body" id="enrollment-body">
                <div class="loading"><div class="spinner"></div></div>
              </div>
            </div>
            <div class="card">
              <div class="card-header">
                <span class="card-title">Courses by Status</span>
              </div>
              <div class="card-body" id="course-status-body">
                <div class="loading"><div class="spinner"></div></div>
              </div>
            </div>
          </div>

          <!-- Revenue + Courses by category, side by side -->
          <div
            style="
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 16px;
              margin-bottom: 24px;
            "
          >
            <div class="card">
              <div class="card-header">
                <span class="card-title">Revenue</span>
              </div>
              <div class="card-body" id="revenue-body">
                <div class="loading"><div class="spinner"></div></div>
              </div>
            </div>
            <div class="card">
              <div class="card-header">
                <span class="card-title">Courses by Category</span>
              </div>
              <div class="card-body" id="course-category-body">
                <div class="loading"><div class="spinner"></div></div>
              </div>
            </div>
          </div>

          <!-- Teacher performance table -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">Teacher Performance</span>
              <span
                class="card-subtitle"
                style="font-size: 12px; color: var(--text-muted)"
                >Courses taught and students enrolled, per teacher</span
              >
            </div>
            <div id="teacher-stats-body">
              <div class="loading"><div class="spinner"></div></div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/ui.js"></script>
    <script>
      const currentUser = auth.requireAuth("admin");

      if (currentUser) {
        renderNav("dashboard");
        loadAll();
        document
          .getElementById("refresh-btn")
          .addEventListener("click", loadAll);
        document
          .getElementById("apply-range-btn")
          .addEventListener("click", loadDateFiltered);
        document
          .getElementById("clear-range-btn")
          .addEventListener("click", () => {
            document.getElementById("from-date").value = "";
            document.getElementById("to-date").value = "";
            loadDateFiltered();
          });
      }

      function getRange() {
        const from = document.getElementById("from-date").value;
        const to = document.getElementById("to-date").value;
        const qs = [];
        if (from) qs.push(`from=${from}`);
        if (to) qs.push(`to=${to}`);
        return qs.length ? `?${qs.join("&")}` : "";
      }

      async function loadAll() {
        const [summary, enrollments, courses, teachers] =
          await Promise.allSettled([
            api.get("/admin/statistics/summary"),
            api.get(`/admin/statistics/enrollments${getRange()}`),
            api.get(`/admin/statistics/courses${getRange()}`),
            api.get("/admin/statistics/teachers"),
          ]);

        renderSummary(
          summary.status === "fulfilled" ? summary.value?.data : null,
        );
        renderRevenue(
          summary.status === "fulfilled" ? summary.value?.data : null,
        );
        renderEnrollmentBreakdown(
          enrollments.status === "fulfilled" ? enrollments.value : null,
        );
        renderCourseBreakdown(
          courses.status === "fulfilled" ? courses.value : null,
        );
        renderTeacherStats(
          teachers.status === "fulfilled" ? teachers.value?.data : null,
        );
      }

      // Only re-fetch the two endpoints that actually accept from/to
      async function loadDateFiltered() {
        setContent("enrollment-body", loadingHTML());
        setContent("course-status-body", loadingHTML());
        setContent("course-category-body", loadingHTML());

        const [enrollments, courses] = await Promise.allSettled([
          api.get(`/admin/statistics/enrollments${getRange()}`),
          api.get(`/admin/statistics/courses${getRange()}`),
        ]);

        renderEnrollmentBreakdown(
          enrollments.status === "fulfilled" ? enrollments.value : null,
        );
        renderCourseBreakdown(
          courses.status === "fulfilled" ? courses.value : null,
        );
      }

      // ---------- Summary ----------
      function renderSummary(data) {
        const students = data?.total_students ?? "—";
        const teachersN = data?.total_teachers ?? "—";
        const coursesN = data?.total_courses ?? "—";
        const enrollmentsN = data?.total_enrollments ?? "—";

        setContent(
          "summary-stats",
          `
    <div class="stat-card accent-teal">
      <div class="stat-label">Students</div>
      <div class="stat-value">${students}</div>
      <div class="stat-sub">registered learners</div>
    </div>
    <div class="stat-card accent-navy">
      <div class="stat-label">Teachers</div>
      <div class="stat-value">${teachersN}</div>
      <div class="stat-sub">active instructors</div>
    </div>
    <div class="stat-card accent-warning">
      <div class="stat-label">Courses</div>
      <div class="stat-value">${coursesN}</div>
      <div class="stat-sub">in the catalogue</div>
    </div>
    <div class="stat-card accent-danger">
      <div class="stat-label">Enrollments</div>
      <div class="stat-value">${enrollmentsN}</div>
      <div class="stat-sub">total requests</div>
    </div>`,
        );
      }

      // ---------- Revenue (only a single total exists on the backend) ----------
      function renderRevenue(data) {
        const total = data?.total_cash_payments;
        const display = total == null ? "—" : formatPrice(total);

        setContent(
          "revenue-body",
          `
    <div>
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:4px;">
        Total cash payments
      </div>
      <div style="font-family:var(--font-display);font-size:30px;font-weight:700;">${display}</div>
      <p style="font-size:12px;color:var(--text-muted);margin-top:8px;">Sum of course prices for all accepted enrollments.</p>
    </div>`,
        );
      }

      // ---------- Enrollments by status ----------
      // Backend categories: active | completed | cancelled | pending (lowercase, derived status)
      function renderEnrollmentBreakdown(res) {
        const rows = res?.data || [];
        const total = res?.total ?? rows.reduce((s, r) => s + r.count, 0);
        if (!rows.length) {
          setContent(
            "enrollment-body",
            emptyHTML("No data", "No enrollments found for this date range."),
          );
          return;
        }

        const html = rows
          .map(
            (r) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
      ${statusBadge(r.status.toUpperCase())}
      <span style="font-family:var(--font-display);font-size:22px;font-weight:700;">${r.count}</span>
    </div>`,
          )
          .join("");

        setContent(
          "enrollment-body",
          `
    <div>${html}</div>
    <div style="margin-top:10px;font-size:12px;color:var(--text-muted);">Total: ${total}</div>`,
        );
      }

      // ---------- Courses by status + by category ----------
      function renderCourseBreakdown(res) {

        const byStatus = res?.data?.by_status || [];
        const byCategory = res?.data?.by_category || [];

        console.log("Course breakdown:", byCategory);

        const statusEl = document.getElementById("course-status-body");
        if (!byStatus.length) {
          setContent(
            statusEl,
            emptyHTML("No data", "No courses found for this date range."),
          );
        } else {
          setContent(
            statusEl,
            byStatus
              .map(
                (r) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
      ${statusBadge(r.status)}
      <span style="font-family:var(--font-display);font-size:22px;font-weight:700;">${r.count}</span>
    </div>`,
              )
              .join(""),
          );
        }

        const catEl = document.getElementById("course-category-body");
        if (!byCategory.length) {
          setContent(
            catEl,
            emptyHTML("No data", "No category breakdown available."),
          );
        } else {
          setContent(
            catEl,
            byCategory
              .map(
                (r) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
      <span>${r.category || "Uncategorized"}</span>
      <span style="font-family:var(--font-display);font-size:18px;font-weight:700;">${r.count}</span>
    </div>`,
              )
              .join(""),
          );
        }
      }

      // ---------- Teacher performance ----------
      function renderTeacherStats(list) {
        const el = document.getElementById("teacher-stats-body");
        if (!list || !list.length) {
          setContent(
            el,
            emptyHTML(
              "No data yet",
              "Teacher statistics will appear here once courses are assigned.",
            ),
          );
          return;
        }

        setContent(
          el,
          `
    <div class="table-wrap" style="border-radius:0 0 var(--radius) var(--radius);border:none;box-shadow:none;">
      <table>
        <thead><tr><th>Teacher</th><th>Courses</th><th>Students enrolled</th></tr></thead>
        <tbody>
          ${list
            .map(
              (t) => `<tr>
            <td class="td-name">${t.teacher_name}</td>
            <td>${t.courses_count}</td>
            <td>${t.students_count}</td>
          </tr>`,
            )
            .join("")}
        </tbody>
      </table>
    </div>`,
        );
      }
    </script>
  </body>
</html>
