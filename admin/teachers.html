<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teachers — EduCenter Admin</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="shell">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">EC</div>
      <div><div class="sidebar-brand-name">EduCenter</div><div class="sidebar-brand-sub">Administration</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav" aria-label="Admin navigation"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-user-name">Loading…</div>
          <div class="sidebar-user-role" id="sidebar-user-role"></div>
        </div>
        <button class="btn-logout" id="btn-logout" title="Sign out" aria-label="Sign out">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
      </button>
      <span class="topbar-title">Teachers</span>
      <div class="topbar-actions"></div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h1>Manage Teachers</h1>
          <p>Add instructors, update their profiles, or deactivate accounts.</p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-primary" id="btn-add">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            Add teacher
          </button>
        </div>
      </div>

      <div class="filters-bar">
        <input class="form-input" type="search" id="search-input" placeholder="Search by name or email…" style="max-width:280px;">
        <select class="form-select" id="active-filter" style="max-width:160px;">
          <option value="">All teachers</option>
          <option value="true">Active</option>
          <option value="false">Deactivated</option>
        </select>
      </div>

      <div id="teachers-container">
        <div class="loading"><div class="spinner"></div><span>Loading teachers…</span></div>
      </div>
    </main>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/ui.js"></script>
<script>


const currentUser = auth.requireAuth('admin');
let allTeachers = [];

if (currentUser) {
  renderNav('teachers');
  document.getElementById('btn-add').addEventListener('click', () => openTeacherModal(null));
  document.getElementById('search-input').addEventListener('input', renderFiltered);
  document.getElementById('active-filter').addEventListener('change', renderFiltered);
  loadTeachers();
}

async function loadTeachers() {
  const el = document.getElementById('teachers-container');
  setContent(el, loadingHTML());
  try {
    const res = await api.get('/admin/teachers');
    allTeachers = Array.isArray(res) ? res : (res.data || res.teachers || []);
    renderFiltered();
  } catch (err) {
    setContent(el, emptyHTML('Couldn\'t load teachers', err.message));
  }
}

function renderFiltered() {
  const q       = document.getElementById('search-input').value.toLowerCase();
  const active  = document.getElementById('active-filter').value;
  const list    = allTeachers.filter(t => {
    const name  = (t.full_name || t.name || '').toLowerCase();
    const email = (t.email || '').toLowerCase();
    const isActive = t.active !== false && t.isActive !== false && (t.status || 'active').toLowerCase() !== 'inactive';
    return (!q || name.includes(q) || email.includes(q))
      && (active === '' || (active === 'true' ? isActive : !isActive));
  });
  const el = document.getElementById('teachers-container');
  if (!list.length) {
    setContent(el, emptyHTML('No teachers found', 'Add your first instructor to start assigning courses.',
      `<button class="btn btn-primary btn-sm" onclick="openTeacherModal(null)">Add teacher</button>`));
    return;
  }
  setContent(el, `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Name</th><th>Email</th><th>Phone</th><th>Status</th><th style="width:160px;">Actions</th>
        </tr></thead>
        <tbody>${list.map(teacherRow).join('')}</tbody>
      </table>
    </div>`);
  el.querySelectorAll('.btn-edit-teacher').forEach(btn =>
    btn.addEventListener('click', () => {
      const t = allTeachers.find(x => (x._id || x.id) === btn.dataset.id);
      if (t) openTeacherModal(t);
    }));
  el.querySelectorAll('.btn-toggle-teacher').forEach(btn =>
    btn.addEventListener('click', () => toggleActive(btn.dataset.id, btn.dataset.active === 'true')));
}

function teacherIsActive(t) {
  return t.active !== false && t.isActive !== false && (t.status || 'active').toLowerCase() !== 'inactive';
}

function teacherRow(t) {
  const id      = t._id || t.id;
  const name    = t.full_name || t.name || '—';
  const email   = t.email || '—';
  const phone   = t.phone || '—';
  const active  = teacherIsActive(t);

  return `<tr>
    <td class="td-name">${name}</td>
    <td class="td-muted">${email}</td>
    <td class="td-muted">${phone}</td>
    <td>${active
      ? '<span class="badge badge-teal">Active</span>'
      : '<span class="badge badge-muted">Deactivated</span>'}</td>
    <td>
      <div class="td-actions">
        <button class="btn btn-ghost btn-sm btn-edit-teacher" data-id="${id}">Edit</button>
        <button class="btn ${active ? 'btn-danger' : 'btn-secondary'} btn-sm btn-toggle-teacher"
          data-id="${id}" data-active="${active}">
          ${active ? 'Deactivate' : 'Reactivate'}
        </button>
      </div>
    </td>
  </tr>`;
}

function openTeacherModal(t) {
  const isEdit = !!t;
  const id     = t ? (t._id || t.id) : null;

  openModal(
    isEdit ? 'Edit Teacher' : 'Add Teacher',
    `<div class="form-row">
       <div class="form-group">
         <label class="form-label" for="t-name">Full name <span class="req">*</span></label>
         <input class="form-input" id="t-name" type="text" value="${t?.full_name || t?.name || ''}" placeholder="Instructor name">
       </div>
       <div class="form-group">
         <label class="form-label" for="t-phone">Phone</label>
         <input class="form-input" id="t-phone" type="tel" value="${t?.phone || ''}" placeholder="+34 600 000 000">
       </div>
     </div>
     <div class="form-group">
       <label class="form-label" for="t-email">Email address <span class="req">*</span></label>
       <input class="form-input" id="t-email" type="email" value="${t?.email || ''}" placeholder="teacher@example.com" ${isEdit ? 'readonly' : ''}>
       ${isEdit ? '<p class="form-hint">Email cannot be changed after account creation.</p>' : ''}
     </div>
     ${!isEdit ? `<div class="form-group" style="margin-bottom:0;">
       <label class="form-label" for="t-password">Temporary password <span class="req">*</span></label>
       <input class="form-input" id="t-password" type="password" placeholder="At least 8 characters">
       <p class="form-hint">The teacher will be prompted to change this on first sign-in.</p>
     </div>` : ''}
     <div id="t-error" class="form-error-msg" style="display:none;margin-top:8px;"></div>`,
    `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary btn-sm" id="modal-confirm-btn">${isEdit ? 'Save changes' : 'Create account'}</button>`
  );

  setTimeout(() => {
    document.getElementById('t-name')?.focus();
    document.getElementById('modal-confirm-btn')?.addEventListener('click', async () => {
      const name     = document.getElementById('t-name').value.trim();
      const email    = document.getElementById('t-email').value.trim();
      const phone    = document.getElementById('t-phone').value.trim();
      const password = !isEdit ? document.getElementById('t-password')?.value : null;
      const errEl    = document.getElementById('t-error');
      if (!name || !email) { errEl.textContent = 'Name and email are required.'; errEl.style.display = 'block'; return; }
      if (!isEdit && (!password || password.length < 8)) {
        errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return;
      }
      errEl.style.display = 'none';
      const btn = document.getElementById('modal-confirm-btn');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const body = { full_name: name, email, phone: phone || undefined };
        if (!isEdit) { body.password = password; body.role = 'teacher'; }
        if (isEdit) await api.put(`/admin/teachers/${id}`, body);
        else        await api.post('/admin/teachers', body);
        closeModal();
        showToast(`Teacher ${isEdit ? 'updated' : 'created'} successfully.`, 'success');
        loadTeachers();
      } catch (err) {
        errEl.textContent = err.message || 'Save failed.';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = isEdit ? 'Save changes' : 'Create account';
      }
    });
  }, 50);
}

async function toggleActive(id, currentlyActive) {
  const label = currentlyActive ? 'deactivate' : 'reactivate';
  confirmDialog(
    `${currentlyActive ? 'Deactivate' : 'Reactivate'} teacher`,
    `Are you sure you want to ${label} this teacher account?`,
    currentlyActive ? 'Deactivate' : 'Reactivate',
    async () => {
      try {
        await api.put(`/admin/teachers/${id}`, {
          status: currentlyActive ? 'INACTIVE' : 'ACTIVE',
        });
        closeModal();
        showToast(`Teacher ${currentlyActive ? 'deactivated' : 'reactivated'}.`, 'success');
        loadTeachers();
      } catch (err) { showToast(err.message || 'Action failed.', 'error'); }
    },
    currentlyActive
  );
}
</script>
</body>
</html>
