<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Courses — EduCenter Admin</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div class="shell">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-logo">EC</div>
          <div>
            <div class="sidebar-brand-name">EduCenter</div>
            <div class="sidebar-brand-sub">Administration</div>
          </div>
        </div>
        <nav
          class="sidebar-nav"
          id="sidebar-nav"
          aria-label="Admin navigation"
        ></nav>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <div class="sidebar-avatar" id="sidebar-avatar">?</div>
            <div class="sidebar-user-info">
              <div class="sidebar-user-name" id="sidebar-user-name">
                Loading…
              </div>
              <div class="sidebar-user-role" id="sidebar-user-role"></div>
            </div>
            <button
              class="btn-logout"
              id="btn-logout"
              title="Sign out"
              aria-label="Sign out"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                width="16"
                height="16"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"
                />
              </svg>
            </button>
          </div>
        </div>
      </aside>

      <div class="main">
        <header class="topbar">
          <button
            class="menu-toggle"
            id="menu-toggle"
            aria-label="Toggle sidebar"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
              width="20"
              height="20"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
          </button>
          <span class="topbar-title">Courses</span>
          <div class="topbar-actions"></div>
        </header>

        <main class="page-content">
          <div class="page-header">
            <div>
              <h1>Manage Courses</h1>
              <p>
                Create, edit, and control the status of every course in the
                catalogue.
              </p>
            </div>
            <div class="page-header-actions">
              <button class="btn btn-primary" id="btn-add">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                  width="14"
                  height="14"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M12 4.5v15m7.5-7.5h-15"
                  />
                </svg>
                Add course
              </button>
            </div>
          </div>

          <div class="filters-bar">
            <input
              class="form-input"
              type="search"
              id="search-input"
              placeholder="Search by title…"
              style="max-width: 240px"
            />
            <select
              class="form-select"
              id="cat-filter"
              style="max-width: 200px"
            >
              <option value="">All categories</option>
            </select>
            <select
              class="form-select"
              id="status-filter"
              style="max-width: 160px"
            >
              <option value="">All statuses</option>
              <option value="AVAILABLE">Available</option>
              <option value="FULL">Full</option>
              <option value="FINISHED">Finished</option>
              <option value="CANCELLED">Cancelled</option>
            </select>
          </div>

          <div id="courses-container">
            <div class="loading">
              <div class="spinner"></div>
              <span>Loading courses…</span>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/ui.js"></script>
    <script>
      const currentUser = auth.requireAuth("admin");
      let allCourses = [];
      let categories = [];
      let teachers = [];

      if (currentUser) {
        renderNav("courses");
        document
          .getElementById("btn-add")
          .addEventListener("click", () => openCourseModal(null));
        document
          .getElementById("search-input")
          .addEventListener("input", renderFiltered);
        document
          .getElementById("cat-filter")
          .addEventListener("change", renderFiltered);
        document
          .getElementById("status-filter")
          .addEventListener("change", renderFiltered);
        init();
      }

      async function init() {
        // Load categories and teachers in parallel for the create/edit form
        const [catsRes, teachersRes] = await Promise.allSettled([
          api.get("/categories", true),
          api.get("/admin/teachers"),
        ]);

        if (catsRes.status === "fulfilled") {
          categories = Array.isArray(catsRes.value)
            ? catsRes.value
            : catsRes.value?.data || [];
          const sel = document.getElementById("cat-filter");
          categories.forEach((c) => {
            const o = document.createElement("option");
            o.value = c._id || c.id;
            o.textContent = c.name;
            sel.appendChild(o);
          });
        }
        if (teachersRes.status === "fulfilled") {
          teachers = Array.isArray(teachersRes.value)
            ? teachersRes.value
            : teachersRes.value?.data || [];
        }

        await loadCourses();
      }

      async function loadCourses() {
        const el = document.getElementById("courses-container");
        setContent(el, loadingHTML());
        try {
          const res = await api.get("/courses");
          allCourses = Array.isArray(res) ? res : res.data || res.courses || [];
          renderFiltered();
        } catch (err) {
          setContent(el, emptyHTML("Couldn't load courses", err.message));
        }
      }

      function renderFiltered() {
        const q = document.getElementById("search-input").value.toLowerCase();
        const catId = document.getElementById("cat-filter").value;
        const status = document.getElementById("status-filter").value;
        const list = allCourses.filter((c) => {
          const title = (c.title || c.name || "").toLowerCase();
          const catVal = c.category_id?._id || c.category_id || "";
          const cStatus = (c.status || "").toUpperCase();
          return (
            (!q || title.includes(q)) &&
            (!catId || catVal === catId) &&
            (!status || cStatus === status)
          );
        });
        const el = document.getElementById("courses-container");
        if (!list.length) {
          setContent(
            el,
            emptyHTML(
              "No courses found",
              "Try adjusting your filters or add a new course.",
              `<button class="btn btn-primary btn-sm" onclick="openCourseModal(null)">Add course</button>`,
            ),
          );
          return;
        }
        setContent(
          el,
          `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Title</th><th>Category</th><th>Teacher</th>
          <th>Price</th><th>Seats</th><th>Status</th><th style="width:170px;">Actions</th>
        </tr></thead>
        <tbody>${list.map(courseRow).join("")}</tbody>
      </table>
    </div>`,
        );
        el.querySelectorAll(".btn-edit-course").forEach((btn) =>
          btn.addEventListener("click", () => {
            const c = allCourses.find(
              (x) => (x._id || x.id) === btn.dataset.id,
            );
            if (c) openCourseModal(c);
          }),
        );
        el.querySelectorAll(".btn-change-status").forEach((sel) =>
          sel.addEventListener("change", () =>
            changeStatus(sel.dataset.id, sel.value),
          ),
        );
        el.querySelectorAll(".btn-del-course").forEach((btn) =>
          btn.addEventListener("click", () =>
            deleteCourse(btn.dataset.id, btn.dataset.title),
          ),
        );
      }

      function courseRow(c) {
        const id = c._id || c.id;
        const title = c.title || c.name || "—";
        const catName = c.category_id?.name || "—";
        const teacher = c.teacher_id?.full_name || "—";
        const price = c.price != null ? formatPrice(c.price) : "Free";
        const seats = c.capacity ?? "—";
        const status = (c.status || "AVAILABLE").toUpperCase();

        return `<tr>
    <td class="td-name">${title}</td>
    <td class="td-muted">${catName}</td>
    <td class="td-muted">${teacher}</td>
    <td>${price}</td>
    <td>${seats}</td>
    <td>${statusBadge(status)}</td>
    <td>
      <div class="td-actions">
        <button class="btn btn-ghost btn-sm btn-edit-course" data-id="${id}">Edit</button>
        <select class="form-select btn-change-status" data-id="${id}" style="font-size:12px;padding:4px 8px;">
          <option value="AVAILABLE"${status === "AVAILABLE" ? " selected" : ""}>Available</option>
          <option value="FULL"${status === "FULL" ? " selected" : ""}>Full</option>
          <option value="FINISHED"${status === "FINISHED" ? " selected" : ""}>Finished</option>
          <option value="CANCELLED"${status === "CANCELLED" ? " selected" : ""}>Cancelled</option>
        </select>
        <button class="btn btn-danger btn-sm btn-del-course" data-id="${id}" data-title="${title}">Delete</button>
      </div>
    </td>
  </tr>`;
      }

      function catOptions(selected) {
        return categories
          .map((c) => {
            const id = c._id || c.id;
            return `<option value="${id}"${id === selected ? " selected" : ""}>${c.name}</option>`;
          })
          .join("");
      }
      function teacherOptions(selected) {
        return teachers
          .map((t) => {
            const id = t._id || t.id;
            const name = t.full_name || t.name || t.email || id;
            return `<option value="${id}"${id === selected ? " selected" : ""}>${name}</option>`;
          })
          .join("");
      }

      function openCourseModal(c) {
        const isEdit = !!c;
        const id = c ? c._id || c.id : null;
        const catId =
          c?.category?._id || c?.category?.id || c?.categoryId || "";
        const tId = c?.teacher?._id || c?.teacher?.id || c?.teacherId || "";

        openModal(
          isEdit ? "Edit Course" : "Add Course",
          `<div class="form-row">
       <div class="form-group">
         <label class="form-label" for="c-title">Title <span class="req">*</span></label>
         <input class="form-input" id="c-title" type="text" value="${c?.title || c?.name || ""}" placeholder="Course title" maxlength="120">
       </div>
       <div class="form-group">
         <label class="form-label" for="c-price">Price (€)</label>
         <input class="form-input" id="c-price" type="number" min="0" step="0.01" value="${c?.price ?? ""}" placeholder="0">
       </div>
     </div>
     <div class="form-row">
       <div class="form-group">
         <label class="form-label" for="c-category">Category</label>
         <select class="form-select" id="c-category">
           <option value="">— Select category —</option>
           ${catOptions(catId)}
         </select>
       </div>
       <div class="form-group">
         <label class="form-label" for="c-teacher">Teacher</label>
         <select class="form-select" id="c-teacher">
           <option value="">— Unassigned —</option>
           ${teacherOptions(tId)}
         </select>
       </div>
     </div>
     <div class="form-row">
       <div class="form-group">
         <label class="form-label" for="c-seats">Seats</label>
         <input class="form-input" id="c-seats" type="number" min="1" value="${c?.capacity ?? ""}" placeholder="Unlimited">
       </div>
       <div class="form-group">
         <label class="form-label" for="c-status">Status</label>
         <select class="form-select" id="c-status">
            <option value="available"${!c || (c.status || "").toLowerCase() === "available" ? " selected" : ""}>Available</option>
            <option value="full"${(c?.status || "").toLowerCase() === "full" ? " selected" : ""}>Full</option>
            <option value="completed"${(c?.status || "").toLowerCase() === "completed" ? " selected" : ""}>Completed</option>
            <option value="finished"${(c?.status || "").toLowerCase() === "finished" ? " selected" : ""}>Finished</option>
            <option value="cancelled"${(c?.status || "").toLowerCase() === "cancelled" ? " selected" : ""}>Cancelled</option>
            <option value="upcoming"${(c?.status || "").toLowerCase() === "upcoming" ? " selected" : ""}>Upcoming</option>
          </select>
        </div>
     </div>
     <div class="form-group">
       <label class="form-label" for="c-schedule">Schedule</label>
       <input class="form-input" id="c-schedule" type="text" value="${c?.schedule || ""}" placeholder="e.g. Mon/Wed 18:00–20:00">
     </div>
     <div class="form-group" style="margin-bottom:0;">
       <label class="form-label" for="c-desc">Description</label>
       <textarea class="form-textarea" id="c-desc" placeholder="What will students learn?">${c?.description || ""}</textarea>
     </div>
     <div id="c-error" class="form-error-msg" style="display:none;margin-top:8px;"></div>`,
          `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary btn-sm" id="modal-confirm-btn">${isEdit ? "Save changes" : "Create course"}</button>`,
          { wide: true },
        );

        setTimeout(() => {
          document.getElementById("c-title")?.focus();
          document
            .getElementById("modal-confirm-btn")
            ?.addEventListener("click", async () => {
              const title = document.getElementById("c-title").value.trim();
              const price = document.getElementById("c-price").value;
              const catVal = document.getElementById("c-category").value;
              const tVal = document.getElementById("c-teacher").value;
              const seats = document.getElementById("c-seats").value;
              const status = document.getElementById("c-status").value;
              const schedule = document
                .getElementById("c-schedule")
                .value.trim();
              const desc = document.getElementById("c-desc").value.trim();
              const errEl = document.getElementById("c-error");
              if (!title) {
                errEl.textContent = "Title is required.";
                errEl.style.display = "block";
                return;
              }
              errEl.style.display = "none";
              const body = { title, status, description: desc, schedule };
              if (price !== "") body.price = parseFloat(price);
              if (catVal) body.category_id = catVal; 
              if (tVal) body.teacher_id = tVal;
              if (seats !== "") body.capacity = parseInt(seats, 10);
              const btn = document.getElementById("modal-confirm-btn");
              btn.disabled = true;
              btn.textContent = "Saving…";
              try {
                if (isEdit) await api.put(`/courses/${id}`, body);
                else await api.post("/courses", body);
                closeModal();
                showToast(
                  `Course ${isEdit ? "updated" : "created"}.`,
                  "success",
                );
                loadCourses();
              } catch (err) {
                errEl.textContent = err.message || "Save failed.";
                errEl.style.display = "block";
                btn.disabled = false;
                btn.textContent = isEdit ? "Save changes" : "Create course";
              }
            });
        }, 50);
      }

      async function changeStatus(id, status) {
        try {
          await api.patch(`/courses/${id}/status`, { status });
          showToast(`Course status updated to ${status}.`, "success");
          loadCourses();
        } catch (err) {
          showToast(err.message || "Status change failed.", "error");
        }
      }

      function deleteCourse(id, title) {
        confirmDialog(
          "Delete course",
          `Delete <strong>"${title}"</strong>? All associated enrollments will also be removed. This cannot be undone.`,
          "Delete course",
          async () => {
            try {
              await api.delete(`/courses/${id}`);
              closeModal();
              showToast("Course deleted.", "success");
              loadCourses();
            } catch (err) {
              showToast(err.message || "Delete failed.", "error");
            }
          },
          true,
        );
      }
    </script>
  </body>
</html>
