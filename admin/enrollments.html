<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enrollments — EduCenter Admin</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div class="shell">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-logo">EC</div>
          <div>
            <div class="sidebar-brand-name">EduCenter</div>
            <div class="sidebar-brand-sub">Administration</div>
          </div>
        </div>
        <nav
          class="sidebar-nav"
          id="sidebar-nav"
          aria-label="Admin navigation"
        ></nav>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <div class="sidebar-avatar" id="sidebar-avatar">?</div>
            <div class="sidebar-user-info">
              <div class="sidebar-user-name" id="sidebar-user-name">
                Loading…
              </div>
              <div class="sidebar-user-role" id="sidebar-user-role"></div>
            </div>
            <button
              class="btn-logout"
              id="btn-logout"
              title="Sign out"
              aria-label="Sign out"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                width="16"
                height="16"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"
                />
              </svg>
            </button>
          </div>
        </div>
      </aside>

      <div class="main">
        <header class="topbar">
          <button
            class="menu-toggle"
            id="menu-toggle"
            aria-label="Toggle sidebar"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
              width="20"
              height="20"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
          </button>
          <span class="topbar-title">Enrollments</span>
          <div class="topbar-actions"></div>
        </header>

        <main class="page-content">
          <div class="page-header">
            <div>
              <h1>Enrollment Requests</h1>
              <p>
                Select a course to review, accept, or reject student enrollment
                requests.
              </p>
            </div>
          </div>

          <!-- Step 1: Course picker -->
          <div class="card" style="margin-bottom: 20px">
            <div class="card-body" style="padding: 18px 22px">
              <div
                style="
                  display: flex;
                  align-items: center;
                  gap: 12px;
                  flex-wrap: wrap;
                "
              >
                <label
                  class="form-label"
                  for="course-select"
                  style="margin: 0; white-space: nowrap"
                  >Course:</label
                >
                <select
                  class="form-select"
                  id="course-select"
                  style="flex: 1; max-width: 420px"
                >
                  <option value="">— Choose a course to review —</option>
                </select>
                <div class="filter-chips" id="status-chips">
                  <button class="chip active" data-status="">All</button>
                  <button class="chip" data-status="PENDING_PAYMENT">
                    Pending
                  </button>
                  <button class="chip" data-status="ACCEPTED">Accepted</button>
                  <button class="chip" data-status="REJECTED">Rejected</button>
                </div>
              </div>
            </div>
          </div>

          <div id="enrollments-container">
            <div class="empty">
              <div class="empty-icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="1.5"
                  width="22"
                  height="22"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15"
                  />
                </svg>
              </div>
              <h3>Select a course above</h3>
              <p>
                Enrollment requests for the selected course will appear here.
              </p>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/ui.js"></script>
    <script>
      const currentUser = auth.requireAuth("admin");
      let selectedCourseId = "";
      let activeStatus = "";

      if (currentUser) {
        renderNav("enrollments");
        loadCourses();

        document
          .getElementById("course-select")
          .addEventListener("change", (e) => {
            selectedCourseId = e.target.value;
            if (selectedCourseId) loadEnrollments();
            else
              setContent(
                "enrollments-container",
                emptyHTML(
                  "Select a course above",
                  "Enrollment requests will appear here.",
                ),
              );
          });

        document
          .getElementById("status-chips")
          .addEventListener("click", (e) => {
            const chip = e.target.closest(".chip");
            if (!chip) return;
            document
              .querySelectorAll("#status-chips .chip")
              .forEach((c) => c.classList.remove("active"));
            chip.classList.add("active");
            activeStatus = chip.dataset.status;
            if (selectedCourseId) loadEnrollments();
          });
      }

      async function loadCourses() {
        try {
          const res = await api.get("/courses");
          const list = Array.isArray(res) ? res : res.data || res.courses || [];
          const sel = document.getElementById("course-select");
          list.forEach((c) => {
            const o = document.createElement("option");
            o.value = c._id || c.id;
            o.textContent = c.title || c.name || o.value;
            sel.appendChild(o);
          });
          // Auto-select from URL if present
          const preselect = new URLSearchParams(window.location.search).get(
            "courseId",
          );
          if (preselect) {
            sel.value = preselect;
            sel.dispatchEvent(new Event("change"));
          }
        } catch (err) {
          showToast("Couldn't load course list: " + err.message, "error");
        }
      }

      async function loadEnrollments() {
        const el = document.getElementById("enrollments-container");
        setContent(el, loadingHTML());
        try {
          const url = activeStatus
            ? `/admin/courses/${selectedCourseId}/enrollments?status=${activeStatus}`
            : `/admin/courses/${selectedCourseId}/enrollments`;
          const res = await api.get(url);
          const list = Array.isArray(res)
            ? res
            : res.data || res.enrollments || [];
          renderEnrollments(list);
        } catch (err) {
          setContent(el, emptyHTML("Couldn't load enrollments", err.message));
        }
      }

      function renderEnrollments(list) {
        const el = document.getElementById("enrollments-container");
        if (!list.length) {
          setContent(
            el,
            emptyHTML(
              "No enrollment requests",
              activeStatus
                ? `No ${activeStatus.toLowerCase()} requests for this course.`
                : "No students have requested enrollment in this course yet.",
            ),
          );
          return;
        }

        // Count pending for quick visibility
        const pendingCount = list.filter(
          (e) => (e.status || "").toUpperCase() === "PENDING_PAYMENT",
        ).length;

        setContent(
          el,
          `
    ${
      pendingCount > 0
        ? `<div class="info-box" style="margin-bottom:16px;border-left:3px solid var(--warning);background:var(--warning-light);">
      <strong>${pendingCount} pending request${pendingCount > 1 ? "s" : ""}</strong> awaiting your review.
    </div>`
        : ""
    }
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Student</th><th>Email</th><th>Requested</th><th>Status</th><th>Rejection reason</th><th style="width:160px;">Actions</th>
        </tr></thead>
        <tbody>${list.map(enrollmentRow).join("")}</tbody>
      </table>
    </div>`,
        );

        el.querySelectorAll(".btn-accept").forEach((btn) =>
          btn.addEventListener("click", () =>
            processEnrollment(btn.dataset.id, "ACCEPTED"),
          ),
        );
        el.querySelectorAll(".btn-reject").forEach((btn) =>
          btn.addEventListener("click", () => openRejectModal(btn.dataset.id)),
        );
        el.querySelectorAll(".btn-cancel").forEach((btn) =>
          btn.addEventListener("click", () => {
            confirmDialog(
              "Cancel enrollment",
              "Cancel this student's enrollment? This will free up their seat in the course.",
              "Cancel enrollment",
              () => processEnrollment(btn.dataset.id, "CANCELLED"),
              true,
            );
          }),
        );
      }

      function enrollmentRow(e) {
        const id = e._id || e.id;
        const student = e.student_id || {};
        const name = student.full_name || "—";
        const email = student.email || "—";
        const date = e.created_at || e.createdAt || e.requested_at;
        const status = (e.status || "").toUpperCase();
        const reason = e.rejection_reason || e.rejectionReason || "";
        const isPending = status === "PENDING_PAYMENT";
        const isAccepted = status === "ACCEPTED";

        let actions =
          '<span class="td-muted" style="font-size:12px;">Reviewed</span>';
        if (isPending) {
          actions = `<div class="td-actions">
                      <button class="btn btn-primary btn-sm btn-accept" data-id="${id}">Accept</button>
                      <button class="btn btn-danger btn-sm btn-reject" data-id="${id}">Reject</button>
                    </div>`;
        } else if (isAccepted) {
          actions = `<button class="btn btn-secondary btn-sm btn-cancel" data-id="${id}">Cancel enrollment</button>`;
        }

        return `<tr>
                <td class="td-name">${name}</td>
                <td class="td-muted">${email}</td>
                <td class="td-muted">${formatDate(date)}</td>
                <td>${statusBadge(status)}</td>
                <td class="td-muted" style="max-width:220px;">
                  ${reason ? `<span class="rejection-note" style="display:inline-block;padding:4px 10px;font-size:12px;">${reason}</span>` : "—"}
                </td>
                <td>${actions}</td>
              </tr>`;
      }
      async function processEnrollment(enrollmentId, status, reason) {
        try {
          const body = { status };
          if (reason) body.rejection_reason = reason;
          // API uses POST (not PATCH/PUT) for reviewing enrollments
          await api.post(`/admin/enrollments/${enrollmentId}`, body);
          showToast(
            `Enrollment ${status === "ACCEPTED" ? "accepted" : "rejected"}.`,
            "success",
          );
          closeModal();
          loadEnrollments();
        } catch (err) {
          showToast(err.message || "Action failed.", "error");
        }
      }

      function openRejectModal(enrollmentId) {
        openModal(
          "Reject enrollment request",
          `<p style="color:var(--text-muted);font-size:14px;margin-bottom:14px;">
       Provide a reason so the student understands why their request was not accepted.
     </p>
     <div class="form-group" style="margin-bottom:0;">
       <label class="form-label" for="reject-reason">Reason <span class="req">*</span></label>
       <textarea class="form-textarea" id="reject-reason" placeholder="e.g. Prerequisites not met, course is full, etc." rows="3"></textarea>
     </div>
     <div id="reject-error" class="form-error-msg" style="display:none;margin-top:6px;"></div>`,
          `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
     <button class="btn btn-danger btn-sm" id="modal-confirm-btn">Reject request</button>`,
        );
        setTimeout(() => {
          document.getElementById("reject-reason")?.focus();
          document
            .getElementById("modal-confirm-btn")
            ?.addEventListener("click", async () => {
              const reason = document
                .getElementById("reject-reason")
                .value.trim();
              const errEl = document.getElementById("reject-error");
              if (!reason) {
                errEl.textContent = "Please provide a rejection reason.";
                errEl.style.display = "block";
                return;
              }
              errEl.style.display = "none";
              const btn = document.getElementById("modal-confirm-btn");
              btn.disabled = true;
              btn.textContent = "Rejecting…";
              await processEnrollment(enrollmentId, "REJECTED", reason);
            });
        }, 50);
      }
    </script>
  </body>
</html>
